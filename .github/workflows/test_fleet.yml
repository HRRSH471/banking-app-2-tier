name: Test Fleet

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::162168468250:role/github-actions-deploy-role
          aws-region: ap-northeast-2

      - name: Print Private IPs
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:APP,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["hostname -I"]}' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $CMD_ID"

          sleep 30

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --query "CommandInvocations[*].{Instance:InstanceId,IP:CommandPlugins[0].Output}" \
            --output table   
